name: Keep Render Warm

on:
  schedule:
    # 08:53, 13:53, 18:53 VN prewarm.
    - cron: "53 1,6,11 * * *"
    # 09:03-12:53 VN every 10 minutes.
    - cron: "3,13,23,33,43,53 2-5 * * *"
    # 14:03-17:53 VN every 10 minutes.
    - cron: "3,13,23,33,43,53 7-10 * * *"
    # 19:03-20:53 VN every 10 minutes.
    - cron: "3,13,23,33,43,53 12-13 * * *"
  workflow_dispatch:

jobs:
  keep-render-warm:
    runs-on: ubuntu-latest
    steps:
      - name: Ping staging backend warmup endpoint
        env:
          STAGING_BACKEND_URL: ${{ secrets.STAGING_BACKEND_URL }}
        run: curl -fsS --max-time 20 "$STAGING_BACKEND_URL/warmup" || true
